name: User Account Automation
on:
  schedule:
    - cron: '0 9 * * *' # 10:00 AM WAT (Lagos time)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - setup-python@v4
      - run: pip install telethon
      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python user_send.py